<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blessing &amp; Tolulope — Save The Date</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold:       #C9A84C;
      --gold-light: #E8C97A;
      --gold-pale:  #F5E6C0;
      --gold-deep:  #8B6914;
      --ivory:      #FFFDF8;
      --dark:       #1A1209;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: #fff;
      color: var(--dark);
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── EDGE LINES ── */
    .edge-top, .edge-bottom {
      position: fixed; left: 0; right: 0; height: 4px; z-index: 300;
      background: linear-gradient(90deg, transparent, var(--gold-pale) 15%, var(--gold-light) 35%, var(--gold) 50%, var(--gold-light) 65%, var(--gold-pale) 85%, transparent);
    }
    .edge-top { top: 0; } .edge-bottom { bottom: 0; }

    /* ── AMBIENT ── */
    .ambient {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 50% 110%, rgba(201,168,76,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 30% 20% at 5% 5%, rgba(201,168,76,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 30% 20% at 95% 5%, rgba(201,168,76,0.07) 0%, transparent 60%);
    }

    /* ── SPARKLES ── */
    .sparkles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .sparkles span {
      position: absolute; color: var(--gold); opacity: 0;
      animation: drift linear infinite;
    }
    @keyframes drift {
      0%   { transform: translateY(105vh) rotate(0deg);   opacity: 0;    }
      8%   {                                               opacity: 0.55; }
      92%  {                                               opacity: 0.28; }
      100% { transform: translateY(-40px) rotate(540deg); opacity: 0;    }
    }

    /* ── SCENE ── */
    .scene {
      position: relative; z-index: 10;
      width: 100vw; height: 100dvh;
      display: flex; align-items: center; justify-content: center;
    }

    /* ════════════════════════════════
       ENVELOPE — centred, standalone
       Letter is completely hidden (z-index:0, opacity:0)
       until opened
    ════════════════════════════════ */
    .stage {
      position: relative;
      width: 380px;
      height: 380px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── LETTER ── sits behind envelope, invisible until open */
    .letter {
      position: absolute;
      width: 340px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) translateY(30px);
      opacity: 0;
      z-index: 1;
      background: var(--ivory);
      border-radius: 3px;
      box-shadow: 0 2px 30px rgba(201,168,76,0.18), 0 0 0 1px rgba(201,168,76,0.22);
      overflow: hidden;
      pointer-events: none;
      transition:
        opacity 0.8s ease 0.6s,
        transform 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.6s;
    }
    body.opened .letter {
      opacity: 1;
      transform: translate(-50%, -50%) translateY(-30px);
      z-index: 25;
      pointer-events: all;
    }

    .letter-bar {
      height: 5px;
      background: linear-gradient(90deg, var(--gold-deep), var(--gold-light), var(--gold), var(--gold-light), var(--gold-deep));
    }
    .letter-inner {
      padding: 26px 30px 22px;
      text-align: center;
      position: relative;
    }

    /* Corners */
    .corner { position: absolute; width: 34px; height: 34px; opacity: 0.38; }
    .corner.tl { top:6px; left:6px; }
    .corner.tr { top:6px; right:6px; transform: scaleX(-1); }
    .corner.bl { bottom:6px; left:6px; transform: scaleY(-1); }
    .corner.br { bottom:6px; right:6px; transform: scale(-1,-1); }

    /* Letter content — each line fades in one by one */
    .ri {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    body.opened .ri.show { opacity: 1; transform: translateY(0); }

    .letter-tag {
      font-family: 'Cinzel', serif;
      font-size: 7.5px; letter-spacing: 5px;
      color: var(--gold); margin-bottom: 8px;
    }
    .divider {
      height: 1px; margin: 0 auto 10px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .divider.short { width: 70px; }
    .divider.long  { width: 110px; margin: 12px auto 10px; background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent); }
    .letter-sub {
      font-style: italic; font-size: 14px;
      color: rgba(139,105,20,0.75); margin-bottom: 8px;
    }
    .names {
      font-family: 'Great Vibes', cursive;
      font-size: 52px; color: var(--dark); line-height: 1.1;
    }
    .amp {
      display: block;
      font-family: 'Great Vibes', cursive;
      font-size: 62px; color: var(--gold); line-height: 0.85; margin: 2px 0;
    }
    .save-label {
      font-family: 'Cinzel', serif;
      font-size: 7.5px; letter-spacing: 5px; color: var(--gold); margin-bottom: 5px;
    }
    .date { font-size: 30px; font-weight: 600; color: var(--dark); letter-spacing: 3px; }
    .tagline { font-style: italic; font-size: 12px; color: rgba(26,18,9,0.45); margin-top: 5px; }
    .ornament { margin-top: 12px; font-size: 13px; color: var(--gold); opacity: 0.5; letter-spacing: 6px; }

    /* ── ENVELOPE ── sits on top of letter */
    .envelope {
      position: absolute;
      width: 380px; height: 260px;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      cursor: pointer; z-index: 20;
      outline: none;
      transition: opacity 1s ease 0.3s;
    }
    body.opened .envelope {
      opacity: 0.07;
      pointer-events: none;
    }

    .env-body {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, #f6eeda 0%, #ede0c2 55%, #e8d6b2 100%);
      border-radius: 4px 4px 10px 10px;
      border: 1px solid rgba(201,168,76,0.55);
      box-shadow: 0 6px 32px rgba(201,168,76,0.18), 0 2px 8px rgba(0,0,0,0.06);
      overflow: hidden; z-index: 5;
      transition: box-shadow 0.3s;
    }
    .envelope:hover .env-body {
      box-shadow: 0 12px 44px rgba(201,168,76,0.28), 0 2px 8px rgba(0,0,0,0.08);
    }
    /* Fold lines */
    .env-body::before {
      content: ''; position: absolute; inset: 0;
      background:
        linear-gradient(135deg, transparent 49.2%, rgba(201,168,76,0.2) 49.2%, rgba(201,168,76,0.2) 50.8%, transparent 50.8%),
        linear-gradient(225deg, transparent 49.2%, rgba(201,168,76,0.2) 49.2%, rgba(201,168,76,0.2) 50.8%, transparent 50.8%);
    }
    .env-body::after {
      content: ''; position: absolute; inset: 8px;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 2px 2px 7px 7px; pointer-events: none;
    }

    /* Wax seal */
    .wax-seal {
      position: absolute; bottom: 22px; left: 50%;
      transform: translateX(-50%); width: 58px; height: 58px; z-index: 8;
    }
    .wax-seal svg { width:100%; height:100%; filter: drop-shadow(0 2px 6px rgba(139,26,26,0.38)); }

    .env-names {
      position: absolute; bottom: 10px; width: 100%; text-align: center;
      font-style: italic; font-size: 12px;
      color: rgba(139,105,20,0.65); letter-spacing: 1px; z-index: 6;
    }

    /* Flap */
    .flap {
      position: absolute; top:0; left:0; right:0; height: 140px;
      transform-origin: top center;
      transform-style: preserve-3d;
      transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 12;
    }
    .flap-face {
      width:100%; height:100%;
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      background: linear-gradient(165deg, #eddfc0 0%, #e0ceaa 55%, #d5c296 100%);
      border-left: 1px solid rgba(201,168,76,0.4);
      border-right: 1px solid rgba(201,168,76,0.4);
      border-top: 1px solid rgba(201,168,76,0.4);
      backface-visibility: hidden; position: relative;
    }
    .flap-face::after {
      content:''; position:absolute; top:0; left:22%; right:22%; height:45%;
      background: linear-gradient(180deg, rgba(255,255,255,0.22) 0%, transparent 100%);
      clip-path: polygon(15% 0, 85% 0, 50% 100%);
    }
    body.opened .flap { transform: rotateX(-178deg); }

    /* Hint */
    .hint {
      position: absolute; bottom: -34px; width: 100%; text-align: center;
      font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 4px;
      color: rgba(201,168,76,0.6);
      animation: hintpulse 2.5s ease-in-out infinite;
      pointer-events: none; user-select: none;
    }
    @keyframes hintpulse { 0%,100%{opacity:.35;} 50%{opacity:1;} }
    body.opened .hint { display: none; }

    /* ── MUSIC PLAYER ── */
    .music-player {
      position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
      z-index: 100; display: flex; align-items: center; gap: 12px;
      background: rgba(255,253,248,0.95); backdrop-filter: blur(14px);
      border: 1px solid rgba(201,168,76,0.35); border-radius: 50px;
      padding: 9px 20px 9px 13px;
      box-shadow: 0 4px 24px rgba(201,168,76,0.14), 0 1px 4px rgba(0,0,0,0.05);
      opacity: 0; pointer-events: none;
      transition: opacity 0.8s ease 2s;
      white-space: nowrap;
    }
    body.opened .music-player { opacity: 1; pointer-events: all; }

    .play-btn {
      width:38px; height:38px; border-radius:50%;
      border: 1.5px solid rgba(201,168,76,0.6);
      background: rgba(201,168,76,0.1);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition: background 0.2s, transform 0.15s; flex-shrink:0;
    }
    .play-btn:hover { background: rgba(201,168,76,0.22); transform: scale(1.08); }
    .play-btn svg { width:15px; height:15px; fill: var(--gold-deep); }

    .music-info { display:flex; flex-direction:column; gap:2px; }
    .music-title { font-style:italic; font-size:13px; color:var(--dark); }
    .music-artist { font-family:'Cinzel',serif; font-size:7px; letter-spacing:2px; color:rgba(139,105,20,0.55); }

    .music-bars { display:flex; align-items:flex-end; gap:2.5px; height:18px; flex-shrink:0; }
    .music-bars span {
      display:block; width:3px; background:var(--gold); border-radius:2px; opacity:0.75;
      animation: bar 0.75s ease-in-out infinite alternate;
    }
    .music-bars span:nth-child(1){height:6px;  animation-delay:0s;}
    .music-bars span:nth-child(2){height:14px; animation-delay:0.12s;}
    .music-bars span:nth-child(3){height:8px;  animation-delay:0.27s;}
    .music-bars span:nth-child(4){height:15px; animation-delay:0.07s;}
    .music-bars.paused span { animation-play-state: paused; }
    @keyframes bar { from{transform:scaleY(0.2);} to{transform:scaleY(1);} }

    /* ── RESPONSIVE ── */
    @media (max-width: 420px) {
      .stage    { width: 320px; height: 340px; }
      .envelope { width: 320px; height: 220px; }
      .flap     { height: 118px; }
      .letter   { width: 290px; }
      .names    { font-size: 44px; }
      .amp      { font-size: 52px; }
    }
  </style>
</head>
<body>

  <div class="edge-top"></div>
  <div class="edge-bottom"></div>
  <div class="ambient"></div>

  <div class="sparkles" aria-hidden="true">
    <span style="left:4%;  animation-duration:13s; animation-delay:0s;   font-size:10px;">✦</span>
    <span style="left:14%; animation-duration:17s; animation-delay:5s;   font-size:8px;">✧</span>
    <span style="left:27%; animation-duration:10s; animation-delay:1.5s; font-size:11px;">❋</span>
    <span style="left:43%; animation-duration:15s; animation-delay:8s;   font-size:8px;">✦</span>
    <span style="left:58%; animation-duration:11s; animation-delay:2.5s; font-size:10px;">✧</span>
    <span style="left:73%; animation-duration:16s; animation-delay:4s;   font-size:9px;">❋</span>
    <span style="left:86%; animation-duration:12s; animation-delay:0.8s; font-size:11px;">✦</span>
    <span style="left:94%; animation-duration:9s;  animation-delay:3s;   font-size:8px;">✧</span>
  </div>

  <main class="scene">
    <div class="stage">

      <!-- LETTER (hidden behind envelope until click) -->
      <div class="letter" id="letter">
        <div class="letter-bar"></div>
        <div class="letter-inner">

          <svg class="corner tl" viewBox="0 0 34 34" fill="none"><path d="M2 2L2 17M2 2L17 2" stroke="#C9A84C" stroke-width="1.2"/><circle cx="2" cy="2" r="1.5" fill="#C9A84C"/><path d="M5 5L13 13" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/></svg>
          <svg class="corner tr" viewBox="0 0 34 34" fill="none"><path d="M2 2L2 17M2 2L17 2" stroke="#C9A84C" stroke-width="1.2"/><circle cx="2" cy="2" r="1.5" fill="#C9A84C"/><path d="M5 5L13 13" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/></svg>
          <svg class="corner bl" viewBox="0 0 34 34" fill="none"><path d="M2 2L2 17M2 2L17 2" stroke="#C9A84C" stroke-width="1.2"/><circle cx="2" cy="2" r="1.5" fill="#C9A84C"/><path d="M5 5L13 13" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/></svg>
          <svg class="corner br" viewBox="0 0 34 34" fill="none"><path d="M2 2L2 17M2 2L17 2" stroke="#C9A84C" stroke-width="1.2"/><circle cx="2" cy="2" r="1.5" fill="#C9A84C"/><path d="M5 5L13 13" stroke="#C9A84C" stroke-width="0.5" opacity="0.4"/></svg>

          <p class="letter-tag ri">YOU HAVE BEEN INVITED</p>
          <div class="divider short ri"></div>
          <p class="letter-sub ri">To the wedding of</p>
          <div class="names ri">
            Blessing
            <span class="amp">&</span>
            Tolulope
          </div>
          <div class="divider long ri"></div>
          <p class="save-label ri">SAVE THE DATE</p>
          <p class="date ri">15 · 08 · 2026</p>
          <p class="tagline ri">A celebration of love &amp; forever</p>
          <div class="ornament ri">— ✦ —</div>

        </div>
      </div>

      <!-- ENVELOPE (on top, fades away on click) -->
      <div class="envelope" id="envelope"
           onclick="openEnvelope()"
           role="button" tabindex="0"
           aria-label="Click to open your invitation"
           onkeydown="if(event.key==='Enter'||event.key===' ')openEnvelope()">

        <div class="flap" id="flap">
          <div class="flap-face"></div>
        </div>

        <div class="env-body">
          <div class="wax-seal">
            <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
              <circle cx="30" cy="30" r="28" fill="#8B1A1A" stroke="#C9A84C" stroke-width="1.5"/>
              <circle cx="30" cy="30" r="23" fill="none" stroke="#C9A84C" stroke-width="0.6" stroke-dasharray="2 3"/>
              <text x="30" y="26" text-anchor="middle" font-family="Cormorant Garamond,serif" font-style="italic" font-size="9" fill="#C9A84C">B</text>
              <text x="30" y="37" text-anchor="middle" font-family="Cormorant Garamond,serif" font-style="italic" font-size="10" fill="#C9A84C">&amp;</text>
              <text x="30" y="48" text-anchor="middle" font-family="Cormorant Garamond,serif" font-style="italic" font-size="9" fill="#C9A84C">T</text>
            </svg>
          </div>
          <p class="env-names">Blessing &amp; Tolulope</p>
        </div>

        <p class="hint">CLICK TO OPEN</p>
      </div>

    </div>
  </main>

  <!-- MUSIC PLAYER -->
  <div class="music-player" id="musicPlayer">
    <button class="play-btn" id="playBtn" onclick="toggleMusic()" aria-label="Play or pause">
      <svg id="iconPlay"  viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <div class="music-info">
      <span class="music-title">Can I Have This Dance</span>
      <span class="music-artist">HIGH SCHOOL MUSICAL · 2008</span>
    </div>
    <div class="music-bars paused" id="musicBars">
      <span></span><span></span><span></span><span></span>
    </div>
  </div>

  <audio id="music" loop>
    <source src="song.mp3" type="audio/mpeg"/>
  </audio>
  <div style="position:fixed;left:-9999px;bottom:-9999px;width:1px;height:1px;">
    <div id="yt-player"></div>
  </div>

  <script>
    let isOpened  = false;
    let isPlaying = false;
    const musicEl   = document.getElementById('music');
    const iconPlay  = document.getElementById('iconPlay');
    const iconPause = document.getElementById('iconPause');
    const musicBars = document.getElementById('musicBars');

    function openEnvelope() {
      if (isOpened) return;
      isOpened = true;
      document.body.classList.add('opened');
      revealItems();
      setTimeout(startMusic, 1800);
    }

    function revealItems() {
      const items = document.querySelectorAll('.ri');
      items.forEach((el, i) => {
        setTimeout(() => el.classList.add('show'), 800 + i * 200);
      });
    }

    function startMusic() {
      if (!musicEl) { initYT(); return; }
      musicEl.volume = 0.72;
      const p = musicEl.play();
      if (p !== undefined) {
        p.then(() => setUI(true)).catch(() => { setUI(false); initYT(); });
      }
      musicEl.addEventListener('play',  () => setUI(true));
      musicEl.addEventListener('pause', () => setUI(false));
      musicEl.addEventListener('ended', () => setUI(false));
      musicEl.addEventListener('error', () => initYT());
    }

    function toggleMusic() {
      if (musicEl && !musicEl.error) {
        if (musicEl.paused) musicEl.play().then(() => setUI(true)).catch(()=>{});
        else { musicEl.pause(); setUI(false); }
        return;
      }
      if (ytPlayer && ytReady) {
        isPlaying ? ytPlayer.pauseVideo() : ytPlayer.playVideo();
      }
    }

    function setUI(playing) {
      isPlaying = playing;
      iconPlay.style.display  = playing ? 'none'  : 'block';
      iconPause.style.display = playing ? 'block' : 'none';
      playing ? musicBars.classList.remove('paused') : musicBars.classList.add('paused');
    }

    /* YouTube fallback */
    const YT_VID = 'xBpbM9SXQXE';
    let ytPlayer = null, ytReady = false;

    function initYT() {
      if (document.getElementById('yt-script')) return;
      const s = document.createElement('script');
      s.id = 'yt-script';
      s.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(s);
    }

    window.onYouTubeIframeAPIReady = function() {
      ytReady = true;
      ytPlayer = new YT.Player('yt-player', {
        width:'1', height:'1', videoId: YT_VID,
        playerVars: { autoplay:1, controls:0, rel:0, loop:1, playlist:YT_VID },
        events: {
          onReady(e)       { e.target.setVolume(70); e.target.playVideo(); },
          onStateChange(e) {
            if (e.data === YT.PlayerState.PLAYING) setUI(true);
            if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.ENDED) setUI(false);
          }
        }
      });
    };
  </script>

</body>
</html>
